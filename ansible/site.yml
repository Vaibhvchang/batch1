---
# ============================================================
# Slurm cluster installation on Multipass VMs (Ubuntu 24.04)
# Controller: slurm-controller  (slurmctld)
# Compute:    slurm-node1, slurm-node2  (slurmd)
# ============================================================

# Play 0: Bootstrap — install python3 using raw (no Python needed)
- name: Bootstrap Python on all nodes
  hosts: all
  become: yes
  gather_facts: no
  tasks:
    - name: Install python3 (required by Ansible modules)
      raw: apt-get install -y python3
      changed_when: false

# Play 1: Gather facts from ALL hosts so hostvars is populated
#         for the slurm.conf template (needs CPU counts per node)
- name: Prepare all nodes
  hosts: all
  become: yes
  gather_facts: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install munge authentication daemon
      apt:
        name: munge
        state: present

# Play 2: Configure Slurm controller
- name: Configure Slurm controller
  hosts: controller
  become: yes
  tasks:
    - name: Install slurmctld
      apt:
        name: slurmctld
        state: present

    - name: Ensure /etc/slurm directory exists
      file:
        path: /etc/slurm
        state: directory
        owner: slurm
        group: slurm
        mode: '0755'

    - name: Generate munge key (idempotent)
      command: create-munge-key -r
      args:
        creates: /etc/munge/munge.key

    - name: Set correct permissions on munge key
      file:
        path: /etc/munge/munge.key
        owner: munge
        group: munge
        mode: '0400'

    - name: Fetch munge key to Ansible runner for distribution
      fetch:
        src: /etc/munge/munge.key
        dest: /tmp/munge.key
        flat: yes

    - name: Create slurmctld state directory
      file:
        path: /var/spool/slurmctld
        state: directory
        owner: slurm
        group: slurm
        mode: '0755'

    - name: Create slurm log directory
      file:
        path: /var/log/slurm
        state: directory
        owner: slurm
        group: slurm
        mode: '0755'

    - name: Deploy slurm.conf from template
      template:
        src: templates/slurm.conf.j2
        dest: /etc/slurm/slurm.conf
        owner: slurm
        group: slurm
        mode: '0644'

    - name: Enable and start munge
      systemd:
        name: munge
        enabled: yes
        state: restarted

    - name: Enable and start slurmctld
      systemd:
        name: slurmctld
        enabled: yes
        state: restarted

# Play 3: Configure Slurm compute nodes
- name: Configure Slurm compute nodes
  hosts: compute
  become: yes
  tasks:
    - name: Install slurmd
      apt:
        name: slurmd
        state: present

    - name: Ensure /etc/slurm directory exists
      file:
        path: /etc/slurm
        state: directory
        owner: slurm
        group: slurm
        mode: '0755'

    - name: Push munge key (must match controller)
      copy:
        src: /tmp/munge.key
        dest: /etc/munge/munge.key
        owner: munge
        group: munge
        mode: '0400'

    - name: Create slurmd spool directory
      file:
        path: /var/spool/slurmd
        state: directory
        owner: slurm
        group: slurm
        mode: '0755'

    - name: Create slurm log directory
      file:
        path: /var/log/slurm
        state: directory
        owner: slurm
        group: slurm
        mode: '0755'

    - name: Deploy slurm.conf from template
      template:
        src: templates/slurm.conf.j2
        dest: /etc/slurm/slurm.conf
        owner: slurm
        group: slurm
        mode: '0644'

    - name: Enable and start munge
      systemd:
        name: munge
        enabled: yes
        state: restarted

    - name: Enable and start slurmd
      systemd:
        name: slurmd
        enabled: yes
        state: restarted

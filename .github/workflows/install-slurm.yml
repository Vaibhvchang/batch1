name: Install Slurm on Multipass

on:
  workflow_dispatch:
  # push:
  #   branches: [ main ]

jobs:
  install-slurm:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify multipass is available
        run: multipass version

      - name: Create Multipass VMs (idempotent)
        run: |
          chmod +x scripts/create-vms.sh
          ./scripts/create-vms.sh

      - name: Configure Slurm on all VMs
        run: |
          chmod +x scripts/configure-slurm.sh
          ./scripts/configure-slurm.sh

      - name: Validate Slurm cluster
        run: |
          echo "--- sinfo ---"
          multipass exec slurm-controller -- sinfo
          echo "--- srun test ---"
          multipass exec slurm-controller -- srun -N1 hostname
          echo "Slurm cluster is ready!"

      - name: Print connection info
        run: |
          CONTROLLER_IP=$(multipass info slurm-controller | awk '/IPv4/ {print $2}')
          echo "=========================================="
          echo "Slurm installation completed successfully."
          echo "Controller IP : $CONTROLLER_IP"
          echo "Connect with  : multipass shell slurm-controller"
          echo "Then test     : sinfo"
          echo "=========================================="

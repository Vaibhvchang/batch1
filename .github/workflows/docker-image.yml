name: NGINX CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build NGINX Docker image
        run: |
          docker build -t nginx-github .

      - name: Run NGINX container
        run: |
          docker run -d -p 8080:80 --name nginx_test nginx-github
          sleep 5

      - name: Test NGINX using curl
        run: |
          curl -f http://localhost:8080

      - name: Cleanup
        if: always()
        run: |
          docker rm -f nginx_test
